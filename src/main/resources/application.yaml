spring:
  application:
    name: daengdong-map

  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:60}
      minimum-idle: ${DB_MIN_IDLE:20}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:600000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD_MS:0}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE}
      timeout: ${REDIS_TIMEOUT}
      ssl:
        enabled: ${REDIS_SSL_ENABLED}
  
  batch:
    job:
      enabled: true

jwt:
  secret: ${JWT_SECRET}
  access-token-expire-minutes: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES}
  refresh-token-expire-days: ${JWT_REFRESH_TOKEN_EXPIRE_DAYS}

oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}
    scope: ${KAKAO_SCOPE:account_email}
    admin-key: ${KAKAO_ADMIN_KEY}
    authorize-uri: https://kauth.kakao.com/oauth/authorize
    token-uri: https://kauth.kakao.com/oauth/token
    user-info-uri: https://kapi.kakao.com/v2/user/me
    unlink-uri: https://kapi.kakao.com/v1/user/unlink

websocket:
  endpoint: ${WEBSOCKET_ENDPOINT:/ws}
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}

aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET}
  region: ${AWS_REGION}

ai:
  fastapi:
    mission-judge-uri: ${FASTAPI_MISSION_JUDGE_URI}
    expression-analyze-uri: ${FASTAPI_FACE_ANALYZE_URI}
    healthcare-analyze-uri: ${FASTAPI_HEALTHCARE_ANALYZE_URI}
    healthcare-chat-uri: ${FASTAPI_HEALTHCARE_CHAT_URI}

ranking:
  batch:
    enabled: true
    cron: "0 0 0 * * *"
    cleanup-cron: "0 30 3 * * *"
    retention-cron: "0 0 4 * * *"
    retention:
      week-keep-count: 12
      month-keep-count: 12
      year-keep-count: 3
    zone: Asia/Seoul

analysis:
  backpressure:
    enabled: ${ANALYSIS_BACKPRESSURE_ENABLED:true}
    max-active-tasks: ${ANALYSIS_BACKPRESSURE_MAX_ACTIVE_TASKS:180}
    retry-after-seconds: ${ANALYSIS_BACKPRESSURE_RETRY_AFTER_SECONDS:3}
  sweep:
    enabled: ${ANALYSIS_SWEEP_ENABLED:true}
    fixed-delay-ms: ${ANALYSIS_SWEEP_FIXED_DELAY_MS:30000}
    pending-timeout-seconds: ${ANALYSIS_SWEEP_PENDING_TIMEOUT_SECONDS:120}
    running-timeout-seconds: ${ANALYSIS_SWEEP_RUNNING_TIMEOUT_SECONDS:300}
    batch-size: ${ANALYSIS_SWEEP_BATCH_SIZE:200}
  async:
    executor:
      core-pool-size: ${ANALYSIS_ASYNC_CORE_POOL_SIZE:16}
      max-pool-size: ${ANALYSIS_ASYNC_MAX_POOL_SIZE:32}
      queue-capacity: ${ANALYSIS_ASYNC_QUEUE_CAPACITY:20}

async:
  sse:
    enabled: ${ASYNC_SSE_ENABLED:false}
    emitter-timeout-ms: ${ASYNC_SSE_EMITTER_TIMEOUT_MS:180000}
    heartbeat-interval-ms: ${ASYNC_SSE_HEARTBEAT_INTERVAL_MS:15000}
    redis:
      enabled: ${ASYNC_SSE_REDIS_ENABLED:true}
      channel: ${ASYNC_SSE_REDIS_CHANNEL:analysis-task-status-events}
      node-id: ${ASYNC_SSE_REDIS_NODE_ID:${HOSTNAME:local-node}}
      dedupe-enabled: ${ASYNC_SSE_REDIS_DEDUPE_ENABLED:true}
      dedupe-ttl-seconds: ${ASYNC_SSE_REDIS_DEDUPE_TTL_SECONDS:60}
      dedupe-key-prefix: ${ASYNC_SSE_REDIS_DEDUPE_KEY_PREFIX:analysis-task:sse:dedupe}
    executor:
      core-pool-size: ${ASYNC_SSE_EXECUTOR_CORE_POOL_SIZE:2}
      max-pool-size: ${ASYNC_SSE_EXECUTOR_MAX_POOL_SIZE:8}
      queue-capacity: ${ASYNC_SSE_EXECUTOR_QUEUE_CAPACITY:500}

cache:
  default:
    enabled: ${CACHE_DEFAULT_ENABLED:true}
    ttl-seconds: ${CACHE_DEFAULT_TTL_SECONDS:1800}
    jitter-percent: ${CACHE_DEFAULT_JITTER_PERCENT:20}
    operation-timeout-ms: ${CACHE_DEFAULT_OPERATION_TIMEOUT_MS:300}
    key-version: ${CACHE_DEFAULT_KEY_VERSION:v2}
  mission:
    key: ${CACHE_MISSION_KEY:cache:missions:all}
    operation-timeout-ms: ${CACHE_MISSION_OPERATION_TIMEOUT_MS:${CACHE_DEFAULT_OPERATION_TIMEOUT_MS:300}}
    key-version: ${CACHE_MISSION_KEY_VERSION:${CACHE_DEFAULT_KEY_VERSION:v2}}
  breed:
    key: ${CACHE_BREED_KEY:cache:breeds:all}
    key-version: ${CACHE_BREED_KEY_VERSION:${CACHE_DEFAULT_KEY_VERSION:v2}}
  region:
    key: ${CACHE_REGION_KEY:cache:regions}
    key-version: ${CACHE_REGION_KEY_VERSION:${CACHE_DEFAULT_KEY_VERSION:v2}}
